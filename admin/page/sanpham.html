<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../asset/css/style.css">
    <link rel="stylesheet" href="../asset/css/modal.css">
    <link rel="stylesheet" href="../../css/fontawesome-free/css/all.min.css">
    <title>Admin </title>
</head>



<body>
    <div class="container">

        <!--Sidebar Section-->
        <aside>
            <div class="sidebar">
                <a href="thongke.html">
                    <i class="fas fa-chart-line"></i>
                    <h3>Thống kê</h3>
                </a>
                <a href="nguoidung.html">
                    <i class="fas fa-user"></i>
                    <h3>Người Dùng</h3>
                </a>
                <div class="active">
                    <i class="fas fa-archive"></i>
                    <h3>Sản Phẩm</h3>
                </div>
                <a href="hoadon.html">
                    <i class="fas fa-clipboard-list"></i>
                    <h3>Hóa đơn</h3>
                </a>
                <a href="../index.html" class="last-child">
                    <i class="fas fa-sign-out-alt"></i>
                    <h3>Đăng xuất</h3>
                </a>
            </div>
            <div class="sidebar-re">
                <a href="thongke.html">
                    <i class="fas fa-chart-line"></i>
                </a>
                <a href="nguoidung.html">
                    <i class="fas fa-user"></i>
                </a>
                <div class="active">
                    <i class="fas fa-archive"></i>
                </div>
                <a href="hoadon.html">
                    <i class="fas fa-clipboard-list"></i>
                </a>
                <a href="../index.html" class="last-child">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </aside>
        <!--End of Sidebar Section-->

        <!--Header--><div class="header">
            <div class="toggle">
                <div class="logo">
                    <a href="nguoidung.html">
                        <img src="../image/LogoSach.png">
                        <h2>Admin</h2>
                    </a>
                </div>
            </div>
            <button type="button" class="close" id="head-close-btn">
                <img src="../image/close.png" alt="close" class="icon">
            </button>
            <button type="button" class="menuHeader">
                <img src="../image/menu.png" alt="menu" class="icon">
            </button>
            <button type="button" class="close-mobile" id="head-close-btn-mobile">
                <img src="../image/close.png" alt="close" class="icon">
            </button>
            <button type="button" class="menuHeader-mobile">
                <img src="../image/menu.png" alt="menu" class="icon">
            </button>
        </div>
        <!--End of Header-->

        <!-- Content Section -->
        <div class="container-content">
            <div class="content">
                <div class="grid-header-product">
                    <span>Mã Sách</span>
                    <span>Tên Sách</span>
                    <span>Tác Giả</span>
                    <span>Thể Loại</span>
                    <span>Nhà Xuất Bản</span>
                    <span>Giá Tiền</span>
                    <span>Hình ảnh</span>
                </div>
                <div class="grid-body" id="dataProducts">
                    <!-- JSON -->
                </div>
            </div>


            <!-- Tool Section -->
            <div class="tool">
                <form>
                    <button type="button" class="add" id="add">
                        <img src="../image/add.png" alt="add" class="icon">
                    </button>
                </form>
            </div>
        </div>

        <!-- Tool Menu -->

        <div class="behindMenu" style="display: none;">
        </div>
        <div class="behindMenuFix" style="display: none;">
        </div>
        <div class="tool-menu" style="display: none;">

            <button type="button" class="close menu-close" id="close-btn">
                <img src="../image/close.png" alt="close" class="icon">
            </button>

            <div class="menu-add" style="display: none;">
                <h2>Thêm Sản Phẩm</h2>
                <form class="form" id="form-add">
                    <div class="form-group">
                        <label for="id-product">Hình ảnh:</label>
                        <input type="file" name="picture" id="picture" placeholder="Chọn ảnh">
                        <span class="form-message"></span>
                    </div>
                    <div class="form-group">
                        <label for="id-product">Mã sách:</label>
                        <input type="number" name="id-product" id="id-product" placeholder="Nhập mã sách">
                        <span class="form-message"></span>
                    </div>
                    <div class="form-group">
                        <label for="name-product">Tên sách:</label>
                        <input type="text" name="name-product" id="name-product" placeholder="Nhập tên sách">
                        <span class="form-message"></span>
                    </div>
                    <div class="form-group">
                        <label for="author-product">Tác giả:</label>
                        <input type="text" name="author-product" id="author-product" placeholder="Nhập tác giả">
                        <span class="form-message"></span>
                    </div>
                    <div class="form-group">
                        <label for="category-product">Thể loại:</label>
                        <input type="text" name="category-product" id="category-product" placeholder="Nhập thể loại">
                        <span class="form-message"></span>
                    </div>
                    <div class="form-group">
                        <label for="nxb-product">Nhà xuất bản:</label>
                        <input type="text" name="nxb-product" id="nxb-product" placeholder="Nhập nhà xuất bản">
                        <span class="form-message"></span>
                    </div>
                    <div class="form-group">
                        <label for="total-product">Giá tiền:</label>
                        <input type="number" name="total-product" id="total-product" placeholder="Nhập giá tiền">
                        <span class="form-message"></span>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn-submit">Thêm</button>
                    </div>
                </form>
            </div>
        </div>


        <!--End of Content-Tool-->
    </div>

    <div class="behindMenuModal" style="display: none;">
    </div>
    <div class="modal">
        <div class="headModal">
            <span>Bạn có chắc muốn xóa không?</span>
        </div>
        <div class="choiceModal">
            <button type="button" class="cancel">Hủy</button>
            <button type="button" class="confirm">Xác nhận</button>
        </div>
    </div>

    <div class="behindMenuAlert" style="display: none;">
    </div>
    <div id="customAlert" class="custom-alert">
        <div class="alert-content">
            <p id="alertMessage"></p>
            <button id="alertCloseBtn">OK</button>
        </div>
    </div>




    <script src="../asset/js/validator.js"></script>
    <script src="../asset/js/inputDataProduct.js"></script>
    <script src="../asset/js/index.js"></script>
    <script src="../asset/js/modal.js"></script>
    
    <script>
        messageRequired = 'Vui lòng nhập thông tin.';
        Validator({
            form: '#form-add',
            errorSelector: '.form-message',
            rules: [
                Validator.isRequired('#id-product',messageRequired),
                Validator.isRequired('#name-product',messageRequired),
                Validator.isRequired('#author-product',messageRequired),
                Validator.isRequired('#category-product',messageRequired),
                Validator.isRequired('#nxb-product',messageRequired),
                Validator.isRequired('#total-product',messageRequired),
            ]
        })
    </script>
</body>

</html>
